<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="01_style.css">
</head>
<body>
  <div class="calc" role="application" aria-label="Calculator">
    <div class="display" id="display">
      <div class="history" id="history">&nbsp;</div>
      <div class="output" id="output">0</div>
    </div>
    <div class="keys">
      <button data-action="clear" class="span2">C</button>
      <button data-action="del">DEL</button>
      <button data-value="÷" class="op">÷</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button data-value="×" class="op">×</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button data-value="-" class="op">-</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="+" class="op">+</button>

      <button data-value="0" class="span2">0</button>
      <button data-value=".">.</button>
      <button data-action="equals" class="equal">=</button>
    </div>
  </div>
  <script src="01_app.js"></script>
</body>
</html>
